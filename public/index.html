<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <!-- GDGoCBowen30DayChallenge Day 20 -->
    <title>Interactive User Card Generator</title>
  </head>
  <body
    class="font-['DM_Mono'] min-h-screen bg-gradient-to-r from-teal-100 to bg-cyan-100 flex flex-col gap-10 items-center font-bold"
  >
    <h1 class="text-3xl m-6 uppercase">
      Interactive User Card Generator
    </h1>
    <input
      type="text"
      id="searchInput"
      placeholder="Search user..."
      class="py-2 px-4 border-4 border-teal-300 rounded-xl w-[90%] max-w-lg outline-none"
    />
    <ul
      id="cardContainer"
      class="w-[90%] grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 m-auto gap-6 py-10"
    ></ul>
    <script src="script.js"></script>
  </body>
</html>
